<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Snow Rider 3D Unblocked - Play Free Online | Bobby's Games</title>
    <meta name="description" content="Play Snow Rider 3D unblocked for free. High-speed winter racing game perfect for school or work. No downloads required, fast loading, and mobile friendly.">
    <meta name="keywords" content="Snow Rider 3D, Unblocked Games, Snow Rider 3D Unblocked, Chromebook Games, Bobby's Games, Free Online Games">
    
    <meta property="og:title" content="Snow Rider 3D Unblocked Portal">
    <meta property="og:description" content="The ultimate destination for unblocked winter racing. Play now on any network!">
    <meta property="og:url" content="https://bobbyisgood21.github.io/snow/">

    <style>
        /* Professional Dark-Mode GUI */
        body { 
            background: radial-gradient(circle at center, #1b2735 0%, #08090a 100%);
            color: #ffffff; 
            text-align: center; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* Changed from height to min-height for mobile */
            overflow-x: hidden;
        }

        h1 { 
            font-size: clamp(24px, 8vw, 48px); /* Responsive font size */
            letter-spacing: 4px;
            margin: 20px 0;
            background: linear-gradient(to right, #fff, #00ffcc, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 20px rgba(0, 255, 204, 0.4));
        }

        /* Responsive Container */
        .game-frame {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid #00ffcc;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 0 80px rgba(0, 255, 204, 0.15);
            width: 95vw;
            max-width: 1000px;
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            border: 1px solid #222;
            background: #000;
            display: block;
        }

        /* Fullscreen Button */
        .fs-btn {
            background: #00ffcc;
            color: #08090a;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .fs-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ffcc;
        }

        /* Dashboard Bottom Bar */
        .dashboard {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap; /* Wraps on small screens */
            justify-content: space-around;
            gap: 10px;
            padding: 5px;
        }

        .status-light {
            font-size: 10px;
            color: #00ffcc;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .blink {
            width: 8px;
            height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
    </style>
</head>
<body>

    <h1>Snow Rider 3D</h1>

    <div class="game-frame" id="container">
        <iframe 
            id="game-canvas"
            src="https://itsvijaysingh.github.io/Snow-Rider3D/" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            allowfullscreen="true">
        </iframe>
        
        <button class="fs-btn" onclick="openFullscreen();">Enter Fullscreen</button>
        
        <div class="dashboard">
            <div class="status-light"><span class="blink"></span> System: Active</div>
            <div class="status-light" style="color:#888;">Proxy: Stealth</div>
            <div class="status-light">V. 2.0.4</div>
        </div>
    </div>

    <script>
        var elem = document.getElementById("game-canvas");
        function openFullscreen() {
          if (elem.requestFullscreen) {
            elem.requestFullscreen();
          } else if (elem.webkitRequestFullscreen) { /* Safari */
            elem.webkitRequestFullscreen();
          } else if (elem.msRequestFullscreen) { /* IE11 */
            elem.msRequestFullscreen();
          }
        }
    </script>

</body>
</html>
