<!DOCTYPE html>
<html>
<head>
    <title>Bobby's Games | Snow Rider 3D</title>
    <style>
        body { 
            background-color: #0b0e14; 
            color: #00ffcc; 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            padding-top: 80px;
        }

        .container {
            border: 3px solid #00ffcc;
            padding: 50px;
            display: inline-block;
            border-radius: 20px;
            background: #161b22;
            box-shadow: 0 0 30px #00ffcc;
        }

        h1 { font-size: 50px; margin-bottom: 10px; }

        .play-button {
            background-color: #00ffcc;
            color: #0b0e14;
            padding: 25px 60px;
            font-size: 35px;
            font-weight: bold;
            border-radius: 100px;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
            transition: 0.3s;
            box-shadow: 0 0 20px #00ffcc;
        }

        .play-button:hover {
            background-color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 40px #fff;
        }

        .status-badge {
            margin-top: 50px;
            padding: 10px 20px;
            border: 1px solid #555;
            display: inline-block;
            border-radius: 5px;
            color: #888;
            font-size: 14px;
        }

        .verified { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SNOW RIDER 3D</h1>
        <p>Click below to launch the unblocked game</p>
        
        <a href="https://html5.gamedistribution.com/3b79a8537ebc414fb4f9672a9b8c68c8/" 
           target="_blank" class="play-button">LAUNCH GAME</a>

        <br>
        <div class="status-badge">
            PROJECT STATUS: <span class="verified">PATH 1 VERIFIED ✅</span>
        </div>
    </div>

    <p style="margin-top: 30px; color: #444;">Project by Bobbyisgood21 | Hack Club Arcade 2026</p>

</body>
</html>
