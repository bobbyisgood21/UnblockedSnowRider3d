<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNBLOCKED PORTAL</title>
    <style>
        /* Professional Dark-Mode GUI */
        body { 
            background: radial-gradient(circle at center, #1b2735 0%, #08090a 100%);
            color: #ffffff; 
            text-align: center; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 { 
            font-size: 48px;
            letter-spacing: 8px;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, #00ffcc, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 20px rgba(0, 255, 204, 0.4));
        }

        /* The Crazy GUI Container */
        .game-frame {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid #00ffcc;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 0 80px rgba(0, 255, 204, 0.15), inset 0 0 15px rgba(0, 255, 204, 0.05);
            width: 92vw;
            max-width: 1000px;
        }

        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            border: 1px solid #222;
            background: #000;
        }

        /* Dashboard Bottom Bar */
        .dashboard {
            margin-top: 15px;
            display: flex;
            justify-content: space-around;
            padding: 5px;
        }

        .status-light {
            font-size: 11px;
            color: #00ffcc;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .blink {
            width: 8px;
            height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
    </style>
</head>
<body>

    <h1>UNBLOCKED</h1>

    <div class="game-frame">
        <iframe 
            src="https://itsvijaysingh.github.io/Snow-Rider3D/" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            allowfullscreen="true">
        </iframe>
        
        <div class="dashboard">
            <div class="status-light"><span class="blink"></span> System: Active</div>
            <div class="status-light" style="color:#888;">Proxy: Encrypted</div>
            <div class="status-light">Mirror 1.0</div>
        </div>
    </div>

</body>
</html>
